on:
  push:
    branches:
      - main
  pull_request:
  release:
    types:
      - created

name: CI
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # @v4.3.0

      - name: Use Node.js 18.x
        uses: actions/setup-node@v1
        with:
          node-version: 18.x

      - name: set package.json version
        uses: decentraland/oddish-action@914e7c59e93e708152aa703c50196740c0526c1d # @master
        with:
          deterministic-snapshot: true
          only-update-versions: true
          main-branch-latest-tag: true

      - name: install
        run:  npm install

      - name: build
        run:  make build

      - name: lint check
        run:  npm run lint:check

      - name: test
        run:  make test

      - name: Publish
        uses: decentraland/oddish-action@914e7c59e93e708152aa703c50196740c0526c1d # @master
        with:
          registry-url: 'https://registry.npmjs.org'
          access: public
          deterministic-snapshot: true
          main-branch-latest-tag: true
          ## sign the deployment
          provenance: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
